# =============================================================
# Combined Kubernetes Manifest
# Includes:
#   1. Todo App      — sauravnirala/nodejs-todo-devops-project:v1
#   2. Tic Tac Toe   — sauravnirala/tictactoe-app:v1
#   3. Ingress       — routes /todo and /tictactoe paths
# Apply with: kubectl apply -f k8s/all-apps.yaml
# =============================================================


# ─────────────────────────────────────────────────────────────
# 1. TODO APP — Deployment
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
        - name: todo-app
          image: sauravnirala/nodejs-todo-devops-project:v1
          ports:
            - containerPort: 3000

---
# ─────────────────────────────────────────────────────────────
# 2. TODO APP — Service
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: todo-app-service
  namespace: myapp
spec:
  selector:
    app: todo-app
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
# ─────────────────────────────────────────────────────────────
# 3. TIC TAC TOE — Deployment
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tictactoe
  namespace: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tictactoe
  template:
    metadata:
      labels:
        app: tictactoe
    spec:
      containers:
        - name: tictactoe
          image: sauravnirala/tictactoe-app:v1
          ports:
            - containerPort: 8081

---
# ─────────────────────────────────────────────────────────────
# 4. TIC TAC TOE — Service
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: tictactoe-service
  namespace: myapp
spec:
  selector:
    app: tictactoe
  ports:
    - port: 80
      targetPort: 8081
  type: ClusterIP
---
# ─────────────────────────────────────────────────────────────
# 5. INGRESS — Route /todo and /tictactoe paths
# ─────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multi-app-ingress
  namespace: myapp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
      http:
        paths:

          # Todo App → http://myapp.example.com/todo/
          - path: /todo
            pathType: Prefix
            backend:
              service:
                name: todo-app-service
                port:
                  number: 3000

          # Tic Tac Toe → http://myapp.example.com/tictactoe/
          - path: /tictactoe
            pathType: Prefix
            backend:
              service:
                name: tictactoe-service
                port:
                  number: 8081

          # Root → defaults to Todo app
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todo-app-service
                port:
                  number: 3000